[pytest]
testpaths = tests
pythonpath = .
addopts = -ra -q --tb=short
markers =
    smoke: Quick tests to check if the pipeline runs without crashing
    functional: Unit tests for dataset logic and model functionality
    integration: End-to-end mini training runs
    dataset: Tests for dataset integrity and leakage
    slow: Tests that might take longer than a few seconds
filterwarnings =
    ignore::DeprecationWarning:tensorboard.*
    ignore::UserWarning:torch.*

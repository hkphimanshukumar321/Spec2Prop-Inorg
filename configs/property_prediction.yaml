# Spec2Prop-Inorg: Property Prediction Config
task: property_prediction
data:
  metadata_pkl: data/processed/spec2prop_property_matched_inorganic.pkl
  raman_parquet: data/processed/spec2prop_raman.parquet
  splits_dir: data/processed/splits/property_matched_inorganic
  cache_dir: data/processed/cache/property_matched
  target_cols: 
    - band_gap_class
    - is_metal
    - formation_energy_class

models:
  - SimpleCNN1D       # Raman-only
  - DescriptorMLP     # Descriptors-only
  - FusionSpec2PropNet # Raman + Descriptors
  - Spec2PropLite     # LiteSpecNet + Descriptors

training:
  batch_size: 64
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  dropout: 0.3
  use_class_weights: true
  early_stopping_patience: 15
  seed: 42
  
  loss_weights:
    band_gap_class: 1.0
    is_metal: 0.7
    formation_energy_class: 0.7

output:
  results_dir: results/property_prediction

# Spec2Prop-Inorg: Family Classification Config
task: family_classification
data:
  metadata_pkl: data/processed/spec2prop_clean_inorganic.pkl
  raman_parquet: data/processed/spec2prop_raman.parquet
  splits_dir: data/processed/splits/clean_inorganic
  cache_dir: data/processed/cache/clean_inorganic
  target_col: chemical_family_model
  random_shift: true
  add_noise: true

models:
#  - MultiScaleSpecNet
#  - SimpleCNN1D
#  - LiteSpecNet
#  - ResidualCNN1D
#  - RamanPCAMLP
  - RamanFormer1D

training:
  batch_size: 64
  epochs: 150
  lr: 0.0005
  weight_decay: 0.0001
  dropout: 0.3
  use_class_weights: true
  use_focal_loss: true
  focal_gamma: 2.0
  use_class_balanced_sampler: true
  early_stopping_patience: 15
  seed: 42
  
  # For RamanPCAMLP
  pca_dim: 128

output:
  results_dir: results/family_classification
